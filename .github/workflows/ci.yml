name: Memora CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: memora
          POSTGRES_PASSWORD: memora_password
          POSTGRES_DB: memora
        ports:
          - 5432:5432
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
          
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
          
      - name: Run Tests
        env:
          DATABASE_URL: postgresql+asyncpg://memora:memora_password@localhost:5432/memora
          REDIS_URL: redis://localhost:6379
          IS_DEVELOPMENT: true
          # We skip neo4j/qdrant in basic CI or mock them
        run: |
          pytest tests/

  build-docker:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Compose Stack
        run: |
          docker compose -f docker-compose.yml build
