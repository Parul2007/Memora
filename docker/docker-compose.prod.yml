# docker-compose.prod.yml
# Production infrastructure orchestration for Memora.
# Uses pre-built images without mounting local source volumes.

version: "3.9"

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: memora-postgres-prod
    environment:
      POSTGRES_DB: memory_ai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d memory_ai"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: always
    networks:
      - memora-net-prod

  redis:
    image: redis:7-alpine
    container_name: memora-redis-prod
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: always
    networks:
      - memora-net-prod

  qdrant:
    image: qdrant/qdrant:latest
    container_name: memora-qdrant-prod
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data_prod:/qdrant/storage
    restart: always
    networks:
      - memora-net-prod

  neo4j:
    image: neo4j:5
    container_name: memora-neo4j-prod
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_memory_heap_initial__size: "1G"
      NEO4J_server_memory_heap_max__size: "1G"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data_prod:/data
      - neo4j_logs_prod:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: always
    networks:
      - memora-net-prod

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: memora-backend-prod
    env_file:
      - ../.env.production
    environment:
      POSTGRES_URL: postgresql+asyncpg://admin:password@postgres/memory_ai
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      PYTHONPATH: /app:/app/backend
      IS_DEVELOPMENT: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - model_cache_prod:/app/.model_cache
    restart: always
    networks:
      - memora-net-prod

  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: memora-celery-prod
    env_file:
      - ../.env.production
    environment:
      POSTGRES_URL: postgresql+asyncpg://admin:password@postgres/memory_ai
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      PYTHONPATH: /app:/app/backend
      IS_DEVELOPMENT: "false"
    volumes:
      - model_cache_prod:/app/.model_cache
    command: ["celery", "-A", "backend.workers.celery_app", "worker", "--loglevel=info", "--pool=solo"]
    depends_on:
      backend:
        condition: service_started
    restart: always
    networks:
      - memora-net-prod

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend.prod
    container_name: memora-frontend-prod
    env_file:
      - ../frontend/.env.production
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    restart: always
    networks:
      - memora-net-prod

volumes:
  postgres_data_prod:
  redis_data_prod:
  qdrant_data_prod:
  neo4j_data_prod:
  neo4j_logs_prod:
  model_cache_prod:

networks:
  memora-net-prod:
    name: memora-net-prod
    driver: bridge
