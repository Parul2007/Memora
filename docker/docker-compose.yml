# docker-compose.yml
# Infrastructure orchestration for Memora local development.
# This file provisions and connects PostgreSQL (with pgvector), Redis, Qdrant,
# Neo4j, FastAPI backend, Celery workers, and Next.js frontend into a single
# reproducible environment using persistent volumes, health-based startup
# ordering, and an isolated bridge network (memora-net).

version: "3.9"

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: memora-postgres

    environment:
      POSTGRES_DB: memory_ai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d memory_ai"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

    restart: unless-stopped

    networks:
      - memora-net



  redis:
    image: redis:7-alpine
    container_name: memora-redis

    command:
      - redis-server
      - --appendonly
      - "yes"

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    restart: unless-stopped

    networks:
      - memora-net



  qdrant:
    image: qdrant/qdrant:latest
    container_name: memora-qdrant

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage

    restart: unless-stopped

    networks:
      - memora-net



  neo4j:
    image: neo4j:5
    container_name: memora-neo4j

    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "512m"

    ports:
      - "7474:7474"
      - "7687:7687"

    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p password 'RETURN 1' || exit 1"
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

    restart: unless-stopped

    networks:
      - memora-net



  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend

    container_name: memora-backend

    env_file:
      - ../.env

    environment:
      POSTGRES_URL: postgresql+asyncpg://admin:password@postgres/memory_ai
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      PYTHONPATH: /app:/app/backend

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy

    ports:
      - "8000:8000"

    volumes:
      - ../backend:/app/backend
      - model_cache:/app/.model_cache



    command:
      [
        "uvicorn",
        "backend.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload"
      ]

    restart: unless-stopped

    networks:
      - memora-net



  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend

    container_name: memora-celery

    env_file:
      - ../.env

    environment:
      POSTGRES_URL: postgresql+asyncpg://admin:password@postgres/memory_ai
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      PYTHONPATH: /app:/app/backend

    volumes:
      - ../backend:/app/backend
      - model_cache:/app/.model_cache

    command:
      - celery
      - -A
      - backend.workers.celery_app
      - worker
      - --loglevel=info
      - --pool=solo



    depends_on:
      backend:
        condition: service_started

    restart: unless-stopped

    networks:
      - memora-net



  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend

    container_name: memora-frontend

    env_file:
      - ../frontend/.env.local

    ports:
      - "3000:3000"

    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public

    depends_on:
      backend:
        condition: service_started

    restart: unless-stopped

    networks:
      - memora-net



volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  model_cache:


networks:
  memora-net:
    name: memora-net
    driver: bridge