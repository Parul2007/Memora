<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Memora Hub</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #FAFAF9;
      color: #11120D;
    }
    
    header {
      background: #11120D;
      color: #FAFAF9;
      padding: 16px;
      text-align: center;
      font-family: 'Playfair Display', serif;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
    }

    .container {
      padding: 20px;
    }

    /* Auth View */
    #auth-view {
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #e7e5e4;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 14px;
    }
    
    button {
      background: #11120D;
      color: #FAFAF9;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    
    button:hover {
      background: #292524;
    }

    /* Dashboard View */
    #dashboard-view {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .status-card {
      background: white;
      border: 1px solid #e7e5e4;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 6px;
    }
    
    .status-indicator.paused {
      background: #f59e0b;
    }

    .sync-button {
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
      width: 100%;
      margin-top: 10px;
    }
    
    .sync-button:hover {
      background: #dcfce7;
    }

    .logout-btn {
      background: none;
      color: #78716c;
      text-decoration: underline;
      padding: 0;
      font-size: 12px;
      margin-top: 10px;
    }
    .logout-btn:hover {
      background: none;
      color: #11120D;
    }

    .error-msg {
      color: #ef4444;
      font-size: 12px;
      text-align: center;
      margin: 0;
      height: 16px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Memora Hub</h1>
  </header>

  <div class="container">
    
    <!-- Auth View -->
    <div id="auth-view">
      <p style="margin-top:0; font-size: 14px; color: #565449;">Log in to your Memora Vault to enable passive syncing.</p>
      <input type="email" id="email" placeholder="Email address" />
      <input type="password" id="password" placeholder="Password" />
      <p id="auth-error" class="error-msg"></p>
      <button id="login-btn">Connect to Vault</button>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view">
      <div class="status-card">
        <div style="font-weight: 600; font-size: 15px; margin-bottom: 4px;">
          <span id="status-dot" class="status-indicator"></span>
          <span id="status-text">Active & Listening</span>
        </div>
        <div style="font-size: 12px; color: #78716c;">
          Connected as <span id="user-email-display">you</span>
        </div>
        
        <button id="pause-btn" style="margin-top: 16px; width: 100%;">Pause Extension</button>
      </div>

      <div class="status-card">
        <div style="font-weight: 600; font-size: 14px; margin-bottom: 8px;">Historical Sync (Beta)</div>
        <div style="font-size: 12px; color: #78716c; margin-bottom: 12px;">Fetch all past conversations from ChatGPT and Claude.</div>
        <button class="sync-button" id="sync-history-btn">Sync Past History</button>
      </div>

      <div style="text-align: center;">
        <button id="logout-btn" class="logout-btn">Disconnect</button>
      </div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
